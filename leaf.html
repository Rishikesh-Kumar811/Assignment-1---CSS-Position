<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaf Shadow Component</title>
  <style>
    :root {
      --bg-color: #f8f5f2;
      --shadow-color: #5c554b;
    }

    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: var(--bg-color);
      overflow-x: hidden;
      font-family: Arial, sans-serif;
    }

    .shadow-sidebar {
      position: absolute;
      top: 0;
      left: 0;
      width: 200px;
      height: 200px;
      pointer-events: none;
      filter: blur(2.5px);
      opacity: 0.16;
      z-index: 10;
    }

    .leaf {
      position: absolute;
      background-color: var(--shadow-color);
      border-radius: 0 100%;
      transform-origin: left top;
    }

    .leaf-1 {
      width: 90px; height: 30px;
      top: 10px; left: -10px;
      transform: rotate(-15deg);
    }

    .leaf-2 {
      width: 110px; height: 35px;
      top: 45px; left: -15px;
      transform: rotate(15deg);
    }

    .leaf-3 {
      width: 140px; height: 40px;
      top: 85px; left: -20px;
      transform: rotate(40deg);
    }

    .leaf-4 {
      width: 160px; height: 45px;
      top: 130px; left: -25px;
      transform: rotate(65deg);
    }

    .leaf-5 {
      width: 100px; height: 35px;
      top: 165px; left: -5px;
      transform: rotate(30deg);
    }
  </style>
</head>
<body>

  <!-- 5 Leaves Shadow Container (200px height) -->
  <div class="shadow-sidebar">
    <div class="leaf leaf-1"></div>
    <div class="leaf leaf-2"></div>
    <div class="leaf leaf-3"></div>
    <div class="leaf leaf-4"></div>
    <div class="leaf leaf-5"></div>
  </div>

</body>
</html>
